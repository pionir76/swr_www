<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SmartRoute — 로그인</title>
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
  <div class="bg">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
  </div>

  <main class="wrap">
    <div class="card">

      <div class="brand">
        <div class="brand-mark">S</div>
        <span class="brand-name">SmartRoute</span>
      </div>

      <div class="head">
        <h1>로그인</h1>
        <p>SmartRoute 관리 시스템에 접속하세요</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="username">사용자 이름</label>
          <div class="input-wrap">
            
            <i class="input-icon input-icon--username"></i>
            <input type="text" id="username"
                   placeholder="사용자 이름을 입력하세요"
                   autocomplete="username" required />
          </div>
        </div>

        <div class="field">
          <label for="password">비밀번호</label>
          <div class="input-wrap">
            <i class="input-icon input-icon--password"></i>
            <input type="password" id="password"
                   placeholder="비밀번호를 입력하세요"
                   autocomplete="current-password" required />
          </div>
        </div>

        <p class="error-msg" id="errorMsg" hidden></p>

        <button type="submit" class="login-btn" id="loginBtn">로그인</button>
      </form>

      <div class="card-footer">
        <span>© COPYRIGHT ⓒ SAMWON TECHNOLOGY. ALL RIGHTS RESERVED </span>
        <span>v1.0.0</span>
      </div>
    </div>
  </main>

  <script src="./config.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
